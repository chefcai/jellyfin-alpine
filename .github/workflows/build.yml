name: Build and Push Jellyfin Alpine Image

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:
  schedule:
    # Daily at 06:15 UTC (staggered 15 min after bazarr-alpine).
    # Skips automatically if upstream version is already published.
    - cron: '15 6 * * *'

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Get Jellyfin version from Alpine apk
        id: jellyfin_version
        run: |
          VERSION=$(docker run --rm alpine:edge sh -c "echo https://dl-cdn.alpinelinux.org/alpine/edge/community >> /etc/apk/repositories && apk update -q && apk search --exact jellyfin" | cut -d- -f2)
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Jellyfin version: $VERSION"

      - name: Check if image already exists for this version
        id: check
        run: |
          VERSION="${{ steps.jellyfin_version.outputs.version }}"
          TOKEN=$(curl -fsSL "https://ghcr.io/token?scope=repository:${{ github.repository }}:pull" | jq -r .token)
          HTTP=$(curl -sSL -o /dev/null -w "%{http_code}" \
            -H "Authorization: Bearer $TOKEN" \
            -H "Accept: application/vnd.oci.image.index.v1+json" \
            -H "Accept: application/vnd.docker.distribution.manifest.v2+json" \
            "https://ghcr.io/v2/${{ github.repository }}/manifests/$VERSION")
          if [ "$HTTP" = "200" ]; then
            echo "needs_build=false" >> $GITHUB_OUTPUT
            echo "::notice::Version $VERSION already published — skipping build."
          else
            echo "needs_build=true" >> $GITHUB_OUTPUT
            echo "::notice::Version $VERSION not yet published (HTTP $HTTP) — will build."
          fi

      - name: Log in to GitHub Container Registry
        if: github.event_name != 'schedule' || steps.check.outputs.needs_build == 'true'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata for Docker
        if: github.event_name != 'schedule' || steps.check.outputs.needs_build == 'true'
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest
            type=raw,value=${{ steps.jellyfin_version.outputs.version }}

      - name: Set up Docker Buildx
        if: github.event_name != 'schedule' || steps.check.outputs.needs_build == 'true'
        uses: docker/setup-buildx-action@v3

      - name: Build and push Docker image
        if: github.event_name != 'schedule' || steps.check.outputs.needs_build == 'true'
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
