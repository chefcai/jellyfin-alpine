name: Build and Push Jellyfin Alpine Image

# Branch / tag / PR -> image tag mapping (handled by docker/metadata-action):
#   main branch       -> :latest  (and :<jellyfin-version> when a new upstream lands)
#   any other branch  -> :<slugified-branch>             e.g. :hw-encode, :feature-foo
#   git tag vX.Y.Z    -> :vX.Y.Z
#   pull request      -> :pr-<num>
#   every build also  -> :<branch>-<sha-short>           immutable pin
on:
  push:
    branches: [ "**" ]
    tags: [ "v*" ]
  pull_request:
  workflow_dispatch:
  schedule:
    # Daily at 06:15 UTC (staggered 15 min after bazarr-alpine).
    # Skips automatically if upstream version is already published.
    - cron: '15 6 * * *'

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Get Jellyfin version from upstream image
        id: jellyfin_version
        run: |
          # Track upstream jellyfin/jellyfin:latest (BRAIN-37: base flipped
          # from Alpine to Debian for gen-9 QSV support). Read the
          # org.opencontainers.image.version label as the canonical Jellyfin
          # version for the :<jellyfin-version> tag on main.
          docker pull jellyfin/jellyfin:latest >/dev/null
          VERSION=$(docker inspect jellyfin/jellyfin:latest \
            --format '{{ index .Config.Labels "org.opencontainers.image.version" }}')
          if [ -z "$VERSION" ] || [ "$VERSION" = "<no value>" ]; then VERSION=unknown; fi
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Jellyfin version: $VERSION"

      # The "skip if upstream version already published" logic is only relevant
      # to the daily schedule trigger. Branch pushes always rebuild because the
      # Dockerfile (or workflow) itself may have changed.
      - name: Check if image already exists for this version (schedule only)
        id: check
        if: github.event_name == 'schedule'
        run: |
          VERSION="${{ steps.jellyfin_version.outputs.version }}"
          TOKEN=$(curl -fsSL "https://ghcr.io/token?scope=repository:${{ github.repository }}:pull" | jq -r .token)
          HTTP=$(curl -sSL -o /dev/null -w "%{http_code}" \
            -H "Authorization: Bearer $TOKEN" \
            -H "Accept: application/vnd.oci.image.index.v1+json" \
            -H "Accept: application/vnd.docker.distribution.manifest.v2+json" \
            "https://ghcr.io/v2/${{ github.repository }}/manifests/$VERSION")
          if [ "$HTTP" = "200" ]; then
            echo "needs_build=false" >> $GITHUB_OUTPUT
            echo "::notice::Version $VERSION already published — skipping scheduled build."
          else
            echo "needs_build=true" >> $GITHUB_OUTPUT
            echo "::notice::Version $VERSION not yet published (HTTP $HTTP) — will build."
          fi

      - name: Decide whether to proceed
        id: decide
        run: |
          if [ "${{ github.event_name }}" = "schedule" ] && [ "${{ steps.check.outputs.needs_build }}" = "false" ]; then
            echo "proceed=false" >> $GITHUB_OUTPUT
          else
            echo "proceed=true" >> $GITHUB_OUTPUT
          fi

      - name: Log in to GitHub Container Registry
        if: steps.decide.outputs.proceed == 'true'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata for Docker
        if: steps.decide.outputs.proceed == 'true'
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=ref,event=tag
            type=ref,event=pr
            type=sha,prefix={{branch}}-,format=short
            type=raw,value=latest,enable={{is_default_branch}}
            type=raw,value=${{ steps.jellyfin_version.outputs.version }},enable={{is_default_branch}}

      - name: Set up Docker Buildx
        if: steps.decide.outputs.proceed == 'true'
        uses: docker/setup-buildx-action@v3

      - name: Build and push Docker image
        if: steps.decide.outputs.proceed == 'true'
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
